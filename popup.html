<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Harvester</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;600&display=swap");

      :root {
        --bg: #0a0a0f;
        --surface: #111118;
        --surface2: #1a1a24;
        --border: #2a2a3a;
        --accent: #7c3aed;
        --accent2: #a855f7;
        --red: #ef4444;
        --green: #22c55e;
        --yellow: #eab308;
        --text: #e2e8f0;
        --muted: #6b7280;
        --mono: "JetBrains Mono", monospace;
        --sans: "Space Grotesk", sans-serif;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 360px;
        background: var(--bg);
        color: var(--text);
        font-family: var(--sans);
        font-size: 13px;
        overflow: hidden;
      }

      .header {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 14px 16px 12px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .logo {
        width: 28px;
        height: 28px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
      }
      .header-title {
        font-weight: 600;
        font-size: 14px;
        color: var(--text);
      }
      .header-sub {
        font-size: 11px;
        color: var(--muted);
        font-family: var(--mono);
      }
      .header-right {
        margin-left: auto;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--muted);
        display: inline-block;
      }
      .status-dot.recording {
        background: var(--red);
        animation: pulse 1.2s ease-in-out infinite;
      }
      .status-dot.done {
        background: var(--green);
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.5;
          transform: scale(0.8);
        }
      }

      .status-bar {
        background: var(--surface2);
        border-bottom: 1px solid var(--border);
        padding: 8px 16px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .status-label {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
      }
      .status-label span {
        color: var(--text);
        font-weight: 500;
      }
      .status-label.recording span {
        color: var(--red);
      }
      .elapsed {
        margin-left: auto;
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        border-bottom: 1px solid var(--border);
      }
      .stat {
        padding: 10px 8px;
        text-align: center;
        border-right: 1px solid var(--border);
      }
      .stat:last-child {
        border-right: none;
      }
      .stat-value {
        font-family: var(--mono);
        font-size: 16px;
        font-weight: 700;
        color: var(--accent2);
        line-height: 1;
        margin-bottom: 3px;
      }
      .stat-label {
        font-size: 9px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .feed-header {
        padding: 8px 16px 4px;
        font-size: 10px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-family: var(--mono);
      }
      .feed {
        height: 110px;
        overflow-y: auto;
        padding: 0 16px 8px;
      }
      .feed::-webkit-scrollbar {
        width: 3px;
      }
      .feed::-webkit-scrollbar-track {
        background: transparent;
      }
      .feed::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 2px;
      }

      .feed-item {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        padding: 3px 0;
        border-bottom: 1px solid rgba(42, 42, 58, 0.5);
        font-size: 11px;
        font-family: var(--mono);
      }
      .feed-time {
        color: var(--muted);
        min-width: 40px;
        font-size: 10px;
      }
      .feed-method {
        font-size: 9px;
        font-weight: 700;
        padding: 1px 4px;
        border-radius: 2px;
        min-width: 34px;
        text-align: center;
      }
      .method-get {
        background: rgba(34, 197, 94, 0.15);
        color: var(--green);
      }
      .method-post {
        background: rgba(168, 85, 247, 0.15);
        color: var(--accent2);
      }
      .method-put {
        background: rgba(234, 179, 8, 0.15);
        color: var(--yellow);
      }
      .method-delete {
        background: rgba(239, 68, 68, 0.15);
        color: var(--red);
      }
      .method-ws {
        background: rgba(59, 130, 246, 0.15);
        color: #60a5fa;
      }
      .method-other {
        background: rgba(107, 114, 128, 0.15);
        color: var(--muted);
      }

      .feed-url {
        flex: 1;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        font-size: 10px;
      }
      .feed-status {
        font-size: 10px;
        min-width: 24px;
        text-align: right;
      }
      .status-2xx {
        color: var(--green);
      }
      .status-3xx {
        color: var(--yellow);
      }
      .status-4xx,
      .status-5xx {
        color: var(--red);
      }

      .controls {
        padding: 12px 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        border-top: 1px solid var(--border);
      }

      .btn {
        width: 100%;
        padding: 10px 16px;
        border: none;
        border-radius: 6px;
        font-family: var(--sans);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: all 0.15s ease;
        letter-spacing: 0.01em;
      }

      .btn-record {
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        color: white;
      }
      .btn-record:hover {
        opacity: 0.9;
        transform: translateY(-1px);
      }

      .btn-stop {
        background: rgba(239, 68, 68, 0.15);
        color: var(--red);
        border: 1px solid rgba(239, 68, 68, 0.3);
      }
      .btn-stop:hover {
        background: rgba(239, 68, 68, 0.25);
      }

      .btn-export {
        background: rgba(34, 197, 94, 0.1);
        color: var(--green);
        border: 1px solid rgba(34, 197, 94, 0.25);
      }
      .btn-export:hover {
        background: rgba(34, 197, 94, 0.2);
      }
      .btn-checkpoint {
        background: rgba(234, 179, 8, 0.1);
        color: var(--yellow);
        border: 1px solid rgba(234, 179, 8, 0.25);
        font-size: 12px;
      }
      .btn-checkpoint:hover {
        background: rgba(234, 179, 8, 0.2);
      }
      .btn-checkpoint:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }
      kbd {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 3px;
        padding: 1px 4px;
        font-size: 10px;
        font-family: var(--mono);
      }
      .btn-export:disabled {
        opacity: 0.3;
        cursor: not-allowed;
        transform: none;
      }

      .btn-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .btn-small {
        padding: 7px 10px;
        font-size: 11px;
        background: var(--surface2);
        color: var(--muted);
        border: 1px solid var(--border);
        border-radius: 5px;
        cursor: pointer;
        font-family: var(--sans);
        font-weight: 500;
        transition: all 0.15s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
      }
      .btn-small:hover {
        background: var(--border);
        color: var(--text);
      }

      .processing {
        padding: 20px;
        text-align: center;
        display: none;
      }
      .processing.visible {
        display: block;
      }
      .spinner {
        width: 24px;
        height: 24px;
        border: 2px solid var(--border);
        border-top-color: var(--accent2);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 10px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .processing-text {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
      }

      .page-info {
        padding: 8px 16px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .page-favicon {
        width: 12px;
        height: 12px;
      }
      .page-title {
        font-size: 11px;
        color: var(--muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        flex: 1;
      }
      .page-title span {
        color: var(--text);
      }

      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="logo">🌾</div>
      <div>
        <div class="header-title">Page Harvester</div>
        <div class="header-sub">Deep capture tool</div>
      </div>
      <div class="header-right">
        <span class="status-dot" id="statusDot"></span>
      </div>
    </div>

    <div class="page-info" id="pageInfo">
      <div class="page-title">Loading tab info…</div>
    </div>

    <div class="status-bar">
      <div class="status-label" id="statusLabel">Status: <span>Idle</span></div>
      <div class="elapsed" id="elapsed"></div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="statReqs">0</div>
        <div class="stat-label">Requests</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="statPages">0</div>
        <div class="stat-label">Pages</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="statWs">0</div>
        <div class="stat-label">WebSockets</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="statTime">—</div>
        <div class="stat-label">Elapsed</div>
      </div>
    </div>

    <div class="feed-header">Live Activity</div>
    <div class="feed" id="feed">
      <div
        style="
          padding: 8px 0;
          color: var(--muted);
          font-family: var(--mono);
          font-size: 11px;
        "
      >
        Start recording to see network activity…
      </div>
    </div>

    <div class="processing" id="processing">
      <div class="spinner"></div>
      <div class="processing-text" id="processingText">
        Fetching response bodies…
      </div>
    </div>

    <div class="controls" id="controls">
      <button class="btn btn-record" id="btnStart">Start Recording</button>
      <button class="btn btn-stop hidden" id="btnStop">Stop & Process</button>
      <button class="btn btn-checkpoint" id="btnCheckpoint" disabled>
        Mark New Page <kbd>Alt+Shift+P</kbd>
      </button>
      <button class="btn btn-export" id="btnExport" disabled>
        Export Capture
      </button>
      <div class="btn-row">
        <button class="btn-small" id="btnClear">Clear</button>
        <button class="btn-small" id="btnHelp">Guide</button>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
